<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zombie Game Pro - Debug Javított</title>
<style>
body{margin:0;overflow:hidden;background:#111;font-family:Arial;}
canvas{display:block;}
#hackBtn{position:fixed;bottom:10px;right:10px;background:#222;color:white;padding:8px;border-radius:8px;z-index:1000;cursor:pointer;}
#hack{display:none;position:fixed;bottom:50px;right:10px;background:#111;color:white;padding:10px;border-radius:10px;font-size:14px;z-index:1000;}
#hack button,#hack input{margin:3px 0; display:block;}
#hud{position:fixed;top:10px;left:10px;color:white;font-size:18px;text-shadow:0 0 5px black;}
#aiMenu{position:fixed;bottom:10px;left:10px;background:#222;color:white;padding:8px;border-radius:8px;z-index:1000;}
#aiMenu button{display:block;margin:3px 0;}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="hud">
<span id="wave">Wave: 1</span> | 
<span id="score">Score: 0</span> | 
<span id="lives">Lives: 3</span>
</div>

<div id="hackBtn">HACK</div>
<div id="hack">
<button onclick="spawnAI()">Spawn AI</button>
<button onclick="spawnBodyguard()">Spawn Bodyguard</button>
<button onclick="spawnZombie()">Spawn Zombie</button>
<button onclick="spawnBoss()">Spawn Boss</button>
<button onclick="killAll()">Kill All</button>
<label><input type="checkbox" id="godChk"> God Mode</label>
<label><input type="checkbox" id="killChk"> Kill Aura</label>
Size: <input type="number" id="sizeInp" value="50" min="20" max="200">
<label><input type="checkbox" id="debugChk"> Debug Mode</label>
</div>

<div id="aiMenu">
AI Commands:<br>
<button onclick="setAIMode('attack')">Attack</button>
<button onclick="setAIMode('defend')">Defend</button>
<button onclick="setAIMode('frontline')">Frontline</button>
</div>

<script>
// ===== CANVAS SETUP =====
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

// ===== GAME VARIABLES =====
let wave=1, score=0, lives=3;
let playerSize=50;
let god=false, killAuraOn=false, debugMode=false;
const minSeparation=50;

let player={x:canvas.width/2,y:canvas.height/2,size:playerSize};
let zombies=[], bullets=[], ais=[], bosses=[];

const hudWave=document.getElementById("wave");
const hudScore=document.getElementById("score");
const hudLives=document.getElementById("lives");

// ===== HACK MENU =====
document.getElementById("hackBtn").onclick=()=>{document.getElementById("hack").style.display=document.getElementById("hack").style.display=="block"?"none":"block";}
document.getElementById("godChk").onchange=function(){god=this.checked;}
document.getElementById("killChk").onchange=function(){killAuraOn=this.checked;}
document.getElementById("sizeInp").oninput=function(){playerSize=parseInt(this.value);player.size=playerSize;}
document.getElementById("debugChk").onchange=function(){debugMode=this.checked;}

// ===== TOUCH CONTROLS =====
document.addEventListener("touchmove",e=>{player.x=e.touches[0].clientX;player.y=e.touches[0].clientY;});

// ===== SPAWN FUNCTIONS =====
function spawnZombie(){zombies.push({x:Math.random()*(canvas.width-40)+20,y:-50,size:40,animOffset:Math.random()*10});}
function spawnBoss(){bosses.push({x:Math.random()*(canvas.width-100)+50,y:-100,size:100,hp:50,pulse:0});}
function spawnAI(){ais.push({x:player.x,y:player.y,size:45,mode:'defend'});}
function spawnBodyguard(){ais.push({x:player.x,y:player.y,size:45,bodyguard:true});}
function killAll(){zombies=[]; bosses=[];}

// ===== AI MODE =====
function setAIMode(mode){ais.forEach(a=>a.mode=mode);}

// ===== UTILS =====
function getClosestZombie(x,y){
    let targets=zombies.concat(bosses);
    if(targets.length===0) return null;
    let minD=Infinity,target=null;
    for(const z of targets){
        let dx=z.x-x, dy=z.y-y, d=Math.hypot(dx,dy);
        if(d<minD){ minD=d; target=z; }
    }
    return target;
}

// ===== SHOOT PLAYER =====
function shootAt(x,y){
    const target=getClosestZombie(x,y);
    if(!target) return;
    bullets.push({x:x, y:y, dx:(target.x-x)/50, dy:(target.y-y)/50, size:10});
}
setInterval(()=>shootAt(player.x,player.y),300);

// ===== DEBUG OVERLAY =====
function drawDebug(){
    if(!debugMode) return;
    ctx.lineWidth=1;

    // ZOMBIES
    ctx.strokeStyle="white";
    zombies.forEach(z=>{
        ctx.beginPath();
        ctx.rect(z.x-z.size/2, z.y-z.size/2, z.size, z.size);
        ctx.stroke();
    });

    // BOSSES
    ctx.strokeStyle="orange";
    bosses.forEach(b=>{
        ctx.beginPath();
        ctx.rect(b.x-b.size/2, b.y-b.size/2, b.size, b.size);
        ctx.stroke();
    });

    // AIS (bodyguards & AI)
    ctx.strokeStyle="cyan";
    ais.forEach(a=>{
        ctx.beginPath();
        ctx.rect(a.x-a.size/2, a.y-a.size/2, a.size, a.size);
        ctx.stroke();
    });

    // BULLETS
    ctx.strokeStyle="yellow";
    bullets.forEach(b=>{
        ctx.beginPath();
        ctx.rect(b.x-b.size/2, b.y-b.size/2, b.size, b.size);
        ctx.stroke();
    });

    // PLAYER
    ctx.strokeStyle="lime";
    ctx.beginPath();
    ctx.rect(player.x-player.size/2, player.y-player.size/2, player.size, player.size);
    ctx.stroke();
}

// ===== GAME LOOP =====
function update(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // --- PLAYER ---
    ctx.fillStyle="green"; 
    let grad=ctx.createRadialGradient(player.x,player.y,0,player.x,player.y,player.size/2);
    grad.addColorStop(0,"#00ff00"); grad.addColorStop(1,"#004400");
    ctx.fillStyle=grad;
    ctx.beginPath(); ctx.arc(player.x, player.y, player.size/2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle="darkgreen"; ctx.fillRect(player.x-5, player.y-10, 10, 5);

    if(killAuraOn){
        ctx.strokeStyle="yellow";
        ctx.lineWidth=3;
        ctx.beginPath();
        ctx.arc(player.x,player.y,60,0,Math.PI*2);
        ctx.shadowBlur=15;
        ctx.shadowColor="yellow";
        ctx.stroke();
        ctx.shadowBlur=0;
    }

    // --- ZOMBIES ---
    for(let i=zombies.length-1; i>=0; i--){
        let z=zombies[i];
        let dx=player.x-z.x, dy=player.y-z.y, dist=Math.hypot(dx,dy);
        z.x += dx/dist*1; z.y += dy/dist*1;
        let anim = Math.sin(Date.now()/200 + z.animOffset)*2;
        let zombieGrad = ctx.createRadialGradient(z.x,z.y+anim,0,z.x,z.y+anim,z.size/2);
        zombieGrad.addColorStop(0,"#ff5555"); zombieGrad.addColorStop(1,"#880000");
        ctx.fillStyle=zombieGrad;
        ctx.beginPath(); ctx.arc(z.x, z.y+anim, z.size/2,0,Math.PI*2); ctx.fill();
        ctx.fillStyle="white"; ctx.fillRect(z.x-7,z.y-5,4,4); ctx.fillRect(z.x+3,z.y-5,4,4);
        ctx.strokeStyle="black"; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(z.x-5,z.y+5); ctx.lineTo(z.x+5,z.y+5); ctx.stroke();

        if(killAuraOn && dist<60){zombies.splice(i,1); score+=10; hudScore.innerText="Score: "+score;}
    }

    // --- BOSSES ---
    for(let i=bosses.length-1; i>=0; i--){
        let b=bosses[i];
        let dx=player.x-b.x, dy=player.y-b.y, dist=Math.hypot(dx,dy);
        b.x += dx/dist*0.6; b.y += dy/dist*0.6;
        b.pulse = Math.sin(Date.now()/300)*5;
        let bossGrad = ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.size/2+b.pulse);
        bossGrad.addColorStop(0,"#000000"); bossGrad.addColorStop(1,"#444444");
        ctx.fillStyle=bossGrad;
        ctx.beginPath(); ctx.arc(b.x, b.y, b.size/2 + b.pulse,0,Math.PI*2); ctx.fill();
        ctx.fillStyle="red"; ctx.fillRect(b.x-b.size/2,b.y-b.size/2-10,(b.hp/50)*b.size,5);
    }

    // --- BULLETS ---
    for(let i=bullets.length-1;i>=0;i--){
        let b=bullets[i]; b.x+=b.dx*6; b.y+=b.dy*6;
        if(b.x<0||b.x>canvas.width||b.y<0||b.y>canvas.height){bullets.splice(i,1); continue;}
        ctx.fillStyle="yellow"; ctx.beginPath(); ctx.arc(b.x,b.y,b.size/2,0,Math.PI*2); ctx.fill();
        for(let j=zombies.length-1;j>=0;j--){
            let z=zombies[j], d=Math.hypot(z.x-b.x,z.y-b.y);
            if(d<z.size/2+b.size/2){zombies.splice(j,1); bullets.splice(i,1); score+=10; hudScore.innerText="Score: "+score; break;}
        }
        for(let j=bosses.length-1;j>=0;j--){
            let bo=bosses[j], d=Math.hypot(bo.x-b.x,bo.y-b.y);
            if(d<bo.size/2+b.size/2){bo.hp-=10; bullets.splice(i,1); if(bo.hp<=0){bosses.splice(j,1);score+=50; hudScore.innerText="Score: "+score;} break;}
        }
    }

    // --- AI & BODYGUARDS + MODE ---
    let frontlineAIs = ais.filter(a=>a.mode==='frontline');
    ais.forEach((a,i)=>{
        let target=getClosestZombie(a.x,a.y);
        let dx=0, dy=0;

        if(a.bodyguard){
            dx=player.x-a.x; dy=player.y-a.y;
            let dist=Math.hypot(dx,dy);
            if(dist>50){ a.x += dx/dist*1.5; a.y += dy/dist*1.5; }
        } else {
            if(a.mode==='attack' && target){
                dx=target.x-a.x; dy=target.y-a.y;
                let dist=Math.hypot(dx,dy);
                if(dist>100){ a.x += dx/dist*1.3; a.y += dy/dist*1.3; }
                if(!a.lastShotTime) a.lastShotTime=0;
                if(dist>50 && Date.now()-a.lastShotTime>300){
                    bullets.push({x:a.x,y:a.y,dx:(target.x-a.x)/50,dy:(target.y-a.y)/50,size:10});
                    a.lastShotTime = Date.now();
                }
            } else if(a.mode==='defend'){
                dx=player.x-a.x; dy=player.y-a.y;
                let dist=Math.hypot(dx,dy);
                if(dist>80){ a.x += dx/dist*1.2; a.y += dy/dist*1.2; }
            } else if(a.mode==='frontline'){
                let index = frontlineAIs.indexOf(a);
                let total = frontlineAIs.length;
                if(total>0){
                    let spacing = canvas.width / (total+1);
                    let targetX = spacing * (index+1);
                    let targetY = canvas.height/2;
                    a.x += (targetX - a.x)*0.1;
                    a.y += (targetY - a.y)*0.1;
                }
                if(target && (!a.lastShotTime || Date.now()-a.lastShotTime>300)){
                    bullets.push({x:a.x,y:a.y,dx:(target.x-a.x)/50,dy:(target.y-a.y)/50,size:10});
                    a.lastShotTime = Date.now();
                }
            }
        }

        ais.forEach((b,j)=>{
            if(i===j) return;
            let dx2=b.x-a.x, dy2=b.y-a.y, dist=Math.hypot(dx2,dy2);
            if(dist<minSeparation && dist>0){
                let push=(minSeparation-dist)/2;
                a.x -= dx2/dist*push; a.y -= dy2/dist*push;
            }
        });

        ctx.fillStyle=a.bodyguard?"#ffff00":"#00aaff";
        ctx.beginPath(); ctx.arc(a.x,a.y,a.size/2,0,Math.PI*2); ctx.fill();
        ctx.fillStyle=a.bodyguard?"orange":"darkblue";
        ctx.fillRect(a.x-5,a.y-10,10,5);
    });

    drawDebug();
    requestAnimationFrame(update);
}
update();

// ===== SPAWN WAVES =====
setInterval(()=>{
    for(let i=0;i<wave;i++) spawnZombie();
    if(wave%5===0) spawnBoss();
    hudWave.innerText="Wave: "+wave;
    wave++;
},2000);
</script>
</body>
</html>
