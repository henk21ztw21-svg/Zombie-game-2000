<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>FPS Game using Babylon.js</title>\n    <script src="https://cdn.babylonjs.com/babylon.js"></script>\n    <style>\n        body { margin: 0; }\n        canvas { width: 100%; height: 100%; }\n    </style>\n</head>\n<body>\n    <canvas id="renderCanvas"></canvas>\n    <script>\n        // Get the canvas DOM element\n        var canvas = document.getElementById('renderCanvas');\n        // Create a Babylon.js engine object\n        var engine = new BABYLON.Engine(canvas, true);\n        // Create a basic scene\n        var createScene = function() {\n            var scene = new BABYLON.Scene(engine);\n            var camera = new BABYLON.ArcRotateCamera("camera1", Math.PI / 2, Math.PI / 4, 10, new BABYLON.Vector3(0, 0, 0), scene);\n            camera.attachControl(canvas, true);\n            var light = new BABYLON.HemisphericLight("light1", new BABYLON.Vector3(0, 1, 0), scene);\n            var ground = BABYLON.MeshBuilder.CreateGround("ground", {width: 10, height: 10}, scene);\n            // Simple zombie as an example\n            var zombie = BABYLON.MeshBuilder.CreateBox("zombie", {size: 1}, scene);\n            zombie.position.y = 0.5;\n            zombie.position.x = 3;\n            return scene;\n        };\n\n        var scene = createScene();\n        engine.runRenderLoop(function() {\n            scene.render();\n        });\n        window.addEventListener('resize', function(){\n            engine.resize();\n        });\n    </script>\n</body>\n</html>\n
